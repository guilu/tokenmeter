tokenmeter:
  analyze-throttle:
    max-concurrent: 1000
    rate-limit-requests-per-window: 10000
    rate-limit-window-duration: 60s

spring:
  datasource:
    url: jdbc:h2:mem:tokenmeter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
