spring:
  application:
    name: tokenmeter-backend
  profiles:
    default: local
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  server:
    port: ${TOKENMETER_MANAGEMENT_PORT:8090}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
  prometheus:
    metrics:
      export:
        enabled: true


tokenmeter:
  public-origin: ${TOKENMETER_PUBLIC_ORIGIN:http://localhost:8081}
  analyze-throttle:
    max-concurrent: ${TOKENMETER_MAX_CONCURRENT_ANALYSES:3}
    queue-capacity: ${TOKENMETER_ANALYZE_QUEUE_CAPACITY:256}
    rate-limit-requests-per-window: ${TOKENMETER_RATE_LIMIT_REQUESTS:5}
    rate-limit-window-duration: ${TOKENMETER_RATE_LIMIT_WINDOW:60s}
    retention:
      success: ${TOKENMETER_JOB_RETENTION_SUCCESS:P7D}
      failed: ${TOKENMETER_JOB_RETENTION_FAILED:P30D}
      cron: ${TOKENMETER_JOB_RETENTION_CRON:0 30 3 * * *}
  repository-intake:
    temp-directory: ${TOKENMETER_WORKDIR:${java.io.tmpdir}/tokenmeter-repositories}
    max-repository-bytes: ${TOKENMETER_MAX_REPOSITORY_BYTES:314572800}
    clone-timeout: ${TOKENMETER_CLONE_TIMEOUT:120s}
  engineering-effort:
    tokens-per-senior-engineer-hour: ${TOKENMETER_ENGINEERING_TOKENS_PER_HOUR:18000}
    hours-per-engineering-day: ${TOKENMETER_ENGINEERING_HOURS_PER_DAY:6.5}
    mode-complexity-multipliers:
      raw: ${TOKENMETER_ENGINEERING_RAW_MULTIPLIER:0.55}
      assisted: ${TOKENMETER_ENGINEERING_ASSISTED_MULTIPLIER:0.80}
      agentic: ${TOKENMETER_ENGINEERING_AGENTIC_MULTIPLIER:1.00}
  github:
    search-url: ${TOKENMETER_GITHUB_SEARCH_URL:https://api.github.com/search/repositories}
    token: ${TOKENMETER_GITHUB_TOKEN:}
    connect-timeout: ${TOKENMETER_GITHUB_CONNECT_TIMEOUT:5s}
    read-timeout: ${TOKENMETER_GITHUB_READ_TIMEOUT:10s}
    user-agent: ${TOKENMETER_GITHUB_USER_AGENT:tokenmeter-backend/1.0 (+https://github.com/diegobarrioh/tokenmeter)}
    trending:
      cache-ttl: ${TOKENMETER_GITHUB_TRENDING_CACHE_TTL:PT30M}
  pricing:
    config-location: ${TOKENMETER_PRICING_CONFIG_LOCATION:classpath:pricing.yaml}
    mapping-location: ${TOKENMETER_PRICING_MAPPING_LOCATION:classpath:pricing-mapping.yaml}
    overrides-location: ${TOKENMETER_PRICING_OVERRIDES_LOCATION:classpath:pricing-overrides.yaml}
    litellm:
      url: ${TOKENMETER_PRICING_LITELLM_URL:https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json}
      timeout: ${TOKENMETER_PRICING_LITELLM_TIMEOUT:10s}
    refresh:
      enabled: ${TOKENMETER_PRICING_REFRESH_ENABLED:false}
      cron: ${TOKENMETER_PRICING_REFRESH_CRON:0 0 3 * * MON}
      zone: ${TOKENMETER_PRICING_REFRESH_ZONE:UTC}
      on-startup: ${TOKENMETER_PRICING_REFRESH_ON_STARTUP:false}
    admin:
      enabled: ${TOKENMETER_PRICING_ADMIN_ENABLED:true}
