spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

tokenmeter:
  pricing:
    refresh:
      enabled: true
      cron: "0 0 3 * * MON"
      zone: UTC
      on-startup: true
    admin:
      enabled: false
