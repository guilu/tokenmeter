spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db:5432/${TOKENMETER_DB_NAME:tokenmeter}}
    username: ${DATABASE_USERNAME:${TOKENMETER_DB_USER}}
    password: ${DATABASE_PASSWORD:${TOKENMETER_DB_PASSWORD}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

tokenmeter:
  pricing:
    refresh:
      enabled: true
      cron: "0 0 3 * * MON"
      zone: UTC
    admin:
      enabled: true
