services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: tokenmeter
      POSTGRES_USER: tokenmeter
      POSTGRES_PASSWORD: tokenmeter
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenmeter -d tokenmeter"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tokenmeter-db:/var/lib/postgresql

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  tokenmeter-db:
