services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${TOKENMETER_DB_NAME:-tokenmeter}
      POSTGRES_USER: ${TOKENMETER_DB_USER:?TOKENMETER_DB_USER must be set (see .env.example)}
      POSTGRES_PASSWORD: ${TOKENMETER_DB_PASSWORD:?TOKENMETER_DB_PASSWORD must be set (see .env.example)}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tokenmeter-db:/var/lib/postgresql

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://db:5432/${TOKENMETER_DB_NAME:-tokenmeter}
      DATABASE_USERNAME: ${TOKENMETER_DB_USER:?TOKENMETER_DB_USER must be set (see .env.example)}
      DATABASE_PASSWORD: ${TOKENMETER_DB_PASSWORD:?TOKENMETER_DB_PASSWORD must be set (see .env.example)}
      TOKENMETER_WORKDIR: ${TOKENMETER_WORKDIR:-/tmp/tokenmeter-repositories}
      TOKENMETER_MAX_REPOSITORY_BYTES: ${TOKENMETER_MAX_REPOSITORY_BYTES:-314572800}
      TOKENMETER_CLONE_TIMEOUT: ${TOKENMETER_CLONE_TIMEOUT:-120s}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=0700,uid=1001
      - ${TOKENMETER_WORKDIR:-/tmp/tokenmeter-repositories}:size=${TOKENMETER_WORKDIR_TMPFS_SIZE:-1g},mode=0700,uid=1001
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${TOKENMETER_BIND_ADDRESS:-127.0.0.1}:${TOKENMETER_BACKEND_PORT:-8081}:8080"
      - "${TOKENMETER_BIND_ADDRESS:-127.0.0.1}:${TOKENMETER_MANAGEMENT_PORT:-8090}:8090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8090/actuator/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Public GA4 Measurement ID (not a secret). Override via host env if needed.
        VITE_GA_MEASUREMENT_ID: "${VITE_GA_MEASUREMENT_ID:-G-2B7EES2G5F}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${TOKENMETER_BIND_ADDRESS:-127.0.0.1}:${TOKENMETER_FRONTEND_PORT:-3001}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  tokenmeter-db:
